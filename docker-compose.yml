name: teamwork

services:
  teamwork:
    build: .
    restart: unless-stopped
    ports:
      - "3000:8000"
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./workspace:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
